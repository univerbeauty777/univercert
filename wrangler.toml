# UniverCert · Cloudflare Workers/Pages config
# Provisionado via Cowork em 08/05/2026
# Account: DXPRO Univerbeauty (4a89b58af57b3ffb99858479a75b1e61)

name = "univercert"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages: aponta pro output do @cloudflare/next-on-pages.
# Esse campo é o que faz o `wrangler pages deploy` ler bindings deste arquivo
# em vez de depender só do Dashboard.
pages_build_output_dir = ".vercel/output/static"

# ----------------------------------------
# D1 Database — univercert-mvp (SQLite)
# Region: ENAM (US East · Ashburn)
# ----------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "univercert-mvp"
database_id = "161fc60a-d5d3-4722-8c04-d8120f2682bc"

# ----------------------------------------
# R2 Bucket — univercert-assets
# Storage para PDFs, PNGs, logos, fundos, assinaturas
# Sem cobrança de egress (vs Supabase $0.09/GB)
# ----------------------------------------
[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "univercert-assets"

# ----------------------------------------
# KV Namespace — univercert-cache
# Sessions short-lived, rate limiting, cache de verify pages
# ----------------------------------------
[[kv_namespaces]]
binding = "CACHE"
id = "155def9a0c5249bca41686d25e4f7208"

# ----------------------------------------
# Browser Rendering — para gerar PDFs dos certificados
# Habilitar no dashboard Cloudflare (Workers > Browser Rendering)
# ----------------------------------------
[browser]
binding = "BROWSER"

# ----------------------------------------
# Variáveis de ambiente públicas
# ----------------------------------------
[vars]
APP_NAME = "UniverCert"
APP_URL = "https://univercert.com.br"
DEFAULT_LOCALE = "pt-BR"
SUPPORTED_LOCALES = "pt-BR,en-US,es-ES"

